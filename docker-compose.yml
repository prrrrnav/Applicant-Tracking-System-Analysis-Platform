version: "3.9"

services:
  server:
    build: .
    container_name: resume-ats-server
    restart: always
    ports:
      - "5001:5000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  redis:
    image: redis:latest
    container_name: resume-ats-redis
    restart: always

  frontend:
    build: ./frontend
    container_name: resume-ats-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server
